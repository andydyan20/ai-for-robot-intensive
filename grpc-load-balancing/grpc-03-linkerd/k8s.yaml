# This example intentionally does NOT configure client-side gRPC load balancing.
#
# Expected issue:
# - Server has 3 pods.
# - Service is normal ClusterIP.
# - Client creates one default gRPC channel.
# - gRPC keeps a long-lived HTTP/2 connection.
# - Requests usually stay on one server pod instead of rotating across all 3.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-echo-server
  labels:
    app: grpc-echo-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: grpc-echo-server
  template:
    metadata:
      labels:
        app: grpc-echo-server
    spec:
      containers:
        - name: server
          image: grpc-echo-server-linkerd:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: grpc-echo-server
  labels:
    app: grpc-echo-server
spec:
  type: ClusterIP
  selector:
    app: grpc-echo-server
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-echo-client
  labels:
    app: grpc-echo-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-echo-client
  template:
    metadata:
      labels:
        app: grpc-echo-client
    spec:
      containers:
        - name: client
          image: grpc-echo-client-linkerd:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: GRPC_TARGET
              value: grpc-echo-server.grpc-linkerd.svc.cluster.local:50051
            - name: INTERVAL_SECONDS
              value: "1"
