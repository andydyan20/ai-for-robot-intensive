# Method 1: client-side gRPC load balancing.
#
# Important pieces:
# - Server has 3 pods.
# - Service is headless: clusterIP: None.
# - Client target is dns:///grpc-echo-server.grpc-client-lb.svc.cluster.local:50051.
# - Client code enables gRPC round_robin.
#
# This lets the gRPC client resolve all server pod IPs and balance calls itself.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-echo-server
  labels:
    app: grpc-echo-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: grpc-echo-server
  template:
    metadata:
      labels:
        app: grpc-echo-server
    spec:
      containers:
        - name: server
          image: grpc-echo-server-client-lb:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: grpc-echo-server
  labels:
    app: grpc-echo-server
spec:
  clusterIP: None
  selector:
    app: grpc-echo-server
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-echo-client
  labels:
    app: grpc-echo-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-echo-client
  template:
    metadata:
      labels:
        app: grpc-echo-client
    spec:
      containers:
        - name: client
          image: grpc-echo-client-client-lb:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: GRPC_TARGET
              value: dns:///grpc-echo-server.grpc-client-lb.svc.cluster.local:50051
            - name: INTERVAL_SECONDS
              value: "1"
            - name: CLIENT_LB
              value: "true"
